<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    
    <style>
        body {
            /* Renamed your file to greenhouse.jpg for best compatibility */
            background-image: url('greenhouse.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-5xl font-extrabold text-white drop-shadow-md">Greenhouse Control</h1>
            <p class="text-white/80 mt-2">Real-time IoT Monitoring & Automation</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="glass p-6 rounded-3xl text-white shadow-xl">
                <canvas id="tempChart"></canvas>
                <p class="text-center mt-4 font-bold tracking-wider">TEMP (°C)</p>
            </div>
            <div class="glass p-6 rounded-3xl text-white shadow-xl">
                <canvas id="humChart"></canvas>
                <p class="text-center mt-4 font-bold tracking-wider">HUMIDITY (%)</p>
            </div>
            <div class="glass p-6 rounded-3xl text-white shadow-xl">
                <canvas id="ldrChart"></canvas>
                <p class="text-center mt-4 font-bold tracking-wider">LIGHT (LDR)</p>
            </div>
            <div class="glass p-6 rounded-3xl text-white shadow-xl">
                <canvas id="mq135Chart"></canvas>
                <p class="text-center mt-4 font-bold tracking-wider">AIR QUALITY</p>
            </div>
        </div>

        <div class="flex justify-center gap-8">
            <button onclick="publish('cmd/pumps', 'TOGGLE')" class="bg-blue-600/80 hover:bg-blue-600 text-white font-bold py-4 px-10 rounded-full shadow-2xl backdrop-blur-md transition-all transform hover:scale-105">Toggle Pumps</button>
            <button onclick="publish('cmd/fan', 'TOGGLE')" class="bg-orange-500/80 hover:bg-orange-500 text-white font-bold py-4 px-10 rounded-full shadow-2xl backdrop-blur-md transition-all transform hover:scale-105">Toggle Fan</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
